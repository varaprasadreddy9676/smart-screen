name: Deploy Landing Page

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build landing site
        run: |
          mkdir -p _site/public/landing
          # Fix asset paths: ../public/ → public/ (index.html moves from landing/ to root)
          sed 's|\.\./public/|public/|g' landing/index.html > _site/index.html
          cp -r public/landing/. _site/public/landing/
          cp public/smart-screen.png _site/public/smart-screen.png

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
